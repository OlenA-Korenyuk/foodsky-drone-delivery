version: "3.8"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: foodsky_postgres
    restart: always
    environment:
      POSTGRES_USER: foodsky_admin
      POSTGRES_PASSWORD: secretpassword123
      POSTGRES_DB: foodsky_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
